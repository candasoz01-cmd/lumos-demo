<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lumos logo mark: symmetric tree-of-life silhouette (not antenna, tower, or candle).
  Colors: Lumos landing — deep navy field, warm antique gold tree, subtle cyan rim glow.
-->
