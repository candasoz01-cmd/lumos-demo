<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lumos shield mark: heraldic shield (not coin/circle/badge), gold rim, dark field.
  Upper skull only (no mandible), world web in cranium, subtle Cyprus hub (left forehead), cyan eye glow.
  Icon only — no caption. Design asset.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title">
  <title id="title">Lumos shield mind-world mark</title>
  <defs>
    <radialGradient id="eyeGlowL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeGlowR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="foreheadWeb" clipPathUnits="userSpaceOnUse">
      <path
        d="M 352 520 Q 512 268 672 520 L 672 520 L 352 520 Z"
      />
    </clipPath>
    <linearGradient id="webWave" x1="380" y1="372" x2="700" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="35%" stop-color="#38bdf8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Shield body: no outer circle — silhouette is the shield -->
  <path
    id="shield"
    d="M 512 132
       L 804 244
       C 864 428 828 692 512 928
       C 196 692 160 428 220 244
       Z"
    fill="#060a12"
    stroke="#c9a15a"
    stroke-width="16"
    stroke-linejoin="round"
  />

  <!-- World web + Cyprus hub (upper cranium only), clipped under skull lines -->
  <g clip-path="url(#foreheadWeb)">
    <rect x="300" y="240" width="424" height="300" fill="transparent"/>
    <!-- Soft field arcs (left-weighted; not centered on skull axis) -->
    <ellipse cx="468" cy="398" rx="190" ry="92" fill="none" stroke="#7dd3fc" stroke-opacity="0.12" stroke-width="1.6"/>
    <ellipse cx="468" cy="398" rx="190" ry="58" fill="none" stroke="#38bdf8" stroke-opacity="0.14" stroke-width="1.4"/>
    <ellipse cx="468" cy="398" rx="190" ry="32" fill="none" stroke="#38bdf8" stroke-opacity="0.1" stroke-width="1.2"/>
    <!-- Cyprus hub: left forehead, inside left curve — drawn under spokes (recessed signature) -->
    <path
      id="cyprusHub"
      d="M 412 374 L 420 372 L 424 377 L 422 383 L 416 385 L 409 380 Z"
      fill="#d4b87a"
      fill-opacity="0.32"
      stroke="#38bdf8"
      stroke-opacity="0.22"
      stroke-width="0.85"
    />
    <!-- Radial web: strokes emanate from near Cyprus toward cranium / world -->
    <path d="M 418 376 L 512 286" fill="none" stroke="#38bdf8" stroke-opacity="0.14" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M 418 376 Q 485 352 585 338" fill="none" stroke="#38bdf8" stroke-opacity="0.16" stroke-width="1.35" stroke-linecap="round"/>
    <path d="M 418 376 Q 505 388 648 392" fill="none" stroke="#38bdf8" stroke-opacity="0.15" stroke-width="1.25" stroke-linecap="round"/>
    <path d="M 418 376 Q 528 412 635 438" fill="none" stroke="#38bdf8" stroke-opacity="0.14" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M 418 376 Q 472 430 512 462" fill="none" stroke="#38bdf8" stroke-opacity="0.13" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M 418 376 Q 392 392 352 404" fill="none" stroke="#38bdf8" stroke-opacity="0.11" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M 418 376 Q 400 348 368 328" fill="none" stroke="#38bdf8" stroke-opacity="0.1" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M 418 376 Q 455 360 538 312" fill="none" stroke="#38bdf8" stroke-opacity="0.12" stroke-width="1.15" stroke-linecap="round"/>
    <path d="M 418 376 Q 488 398 662 368" fill="none" stroke="#38bdf8" stroke-opacity="0.11" stroke-width="1.05" stroke-linecap="round"/>
    <path d="M 392 322 Q 418 376 628 442" fill="none" stroke="#38bdf8" stroke-opacity="0.12" stroke-width="1.35" stroke-linecap="round"/>
    <path d="M 628 318 Q 418 376 384 438" fill="none" stroke="#38bdf8" stroke-opacity="0.12" stroke-width="1.35" stroke-linecap="round"/>
    <path
      d="M 418 376 Q 520 358 692 382"
      fill="none"
      stroke="url(#webWave)"
      stroke-width="2.6"
      stroke-linecap="round"
    />
    <!-- Distant web nodes (muted; not competing with hub) -->
    <circle cx="538" cy="318" r="2.4" fill="#d4b87a" fill-opacity="0.22"/>
    <circle cx="598" cy="388" r="2.4" fill="#d4b87a" fill-opacity="0.22"/>
  </g>

  <!-- Upper skull only: open bottom (no jaw) -->
  <path
    d="M 352 520 Q 512 268 672 520"
    fill="none"
    stroke="#ebe6dc"
    stroke-width="13"
    stroke-linecap="round"
  />
  <path d="M 412 498 Q 512 468 612 498" fill="none" stroke="#dcd6cf" stroke-width="7" stroke-opacity="0.45" stroke-linecap="round"/>

  <!-- Eyes: soft cyan light -->
  <ellipse cx="438" cy="508" rx="36" ry="22" fill="url(#eyeGlowL)" opacity="0.9"/>
  <ellipse cx="586" cy="508" rx="36" ry="22" fill="url(#eyeGlowR)" opacity="0.9"/>
  <path d="M 404 508 A 40 24 0 0 1 472 508" fill="none" stroke="#ebe6dc" stroke-width="8" stroke-linecap="round"/>
  <path d="M 552 508 A 40 24 0 0 1 620 508" fill="none" stroke="#ebe6dc" stroke-width="8" stroke-linecap="round"/>

  <!-- Nose tick (minimal) -->
  <path d="M 512 520 L 512 556" fill="none" stroke="#dcd6cf" stroke-width="6" stroke-opacity="0.5" stroke-linecap="round"/>
</svg>
